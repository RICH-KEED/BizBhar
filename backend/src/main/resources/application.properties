# ===== DATABASE =====
# Set SPRING_DATASOURCE_* and JWT_SECRET in backend/.env (see .env.example). Do not commit secrets.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bizbhar}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JWT =====
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# ===== DEMO DATA (buyer testing) =====
# Creates demo-seller@bizbhar.test + shop + products when that email is absent. Set false to skip.
bizbhar.seed.enabled=true

# ===== SERVER =====
server.port=8081

# ===== Stripe (TEST keys — Dashboard "Test mode") =====
# Put keys in backend/.env (see .env.example).
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
